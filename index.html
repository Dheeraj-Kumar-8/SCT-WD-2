<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional Stopwatch</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">

    <div class="glass-card">

      <h1>STOPWATCH</h1>
      <p class="subtitle">SkillCraft Technology Web Application</p>

      <div class="time-display" id="display">
        00 : 00 : 00
      </div>

      <div class="buttons">
        <button id="startBtn" class="start">Start</button>
        <button id="pauseBtn" class="pause">Pause</button>
        <button id="resetBtn" class="reset">Reset</button>
        <button id="lapBtn" class="lap">Lap</button>
      </div>

      <div class="lap-container">
        <h2>Lap Times</h2>
        <ul id="laps"></ul>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
